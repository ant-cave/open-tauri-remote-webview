name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      is_prerelease: ${{ steps.check-prerelease.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
      - id: get-version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - id: check-prerelease
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          # 版本号包含 "-"（如 0.0.5-alpha.0）-> prerelease，否则为 release
          case "$VERSION" in
            *-*) echo "is_prerelease=true" ;;
            *)   echo "is_prerelease=false" ;;
          esac >> $GITHUB_OUTPUT
      - name: Check Cargo.toml version
        run: |
          V=$(grep -m1 '^version = ' Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          [ "$V" = "${{ steps.get-version.outputs.version }}" ] || { echo "Cargo version mismatch: $V"; exit 1; }
      - name: Check package.json version
        run: |
          V=$(node -p "require('./guest-js/package.json').version")
          [ "$V" = "${{ steps.get-version.outputs.version }}" ] || { echo "npm version mismatch: $V"; exit 1; }

  publish-crate:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev
      - name: Publish macros crate
        run: cargo publish --no-verify --manifest-path macros/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Publish main crate
        run: cargo publish --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./guest-js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - run: |
          if [ "${{ needs.validate.outputs.is_prerelease }}" = "true" ]; then
            npm publish --tag next
          else
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libglib2.0-dev
      - name: Build crate package
        run: cargo package --no-verify
      - name: Build npm package
        run: |
          npm ci
          npm pack
        working-directory: ./guest-js
      - uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ needs.validate.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: |
            target/package/open-tauri-remote-webview-${{ needs.validate.outputs.version }}.crate
            guest-js/open-tauri-remote-webview-${{ needs.validate.outputs.version }}.tgz
